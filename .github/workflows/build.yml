on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  security-events: write # upload Sarif results

name: Build
jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set the TAG value
      id: get-TAG
      run: |
        echo "$(make -s log | grep TAG)" >> "$GITHUB_ENV"

    - name: Build container operator image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        tags: rancher/hardened-sriov-network-operator:${{ env.TAG }}-amd64
        target: operator
        file: Dockerfile
        build-args: |
          TAG=${{ env.TAG }}

    - name: Build container config-daemon image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        tags: rancher/hardened-sriov-network-config-daemon:${{ env.TAG }}-amd64
        target: config-daemon
        file: Dockerfile
        build-args: |
          TAG=${{ env.TAG }}

    - name: Build container webhook image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        tags: rancher/hardened-sriov-network-webhook:${{ env.TAG }}-amd64
        target: webhook
        file: Dockerfile
        build-args: |
          TAG=${{ env.TAG }}
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        image-ref: rancher/hardened-sriov-network-operator:${{ env.TAG }}-amd64
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        format: 'sarif'
        output: 'trivy-results.sarif'
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Set the TAG value
      id: get-TAG
      run: |
        echo "$(make -s log | grep TAG)" >> "$GITHUB_ENV"

    - name: Build container operator image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        tags: rancher/hardened-sriov-network-operator:${{ env.TAG }}-arm64
        target: operator
        file: Dockerfile
        build-args: |
          TAG=${{ env.TAG }}

    - name: Build container config-daemon image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        tags: rancher/hardened-sriov-network-config-daemon:${{ env.TAG }}-arm64
        target: config-daemon
        file: Dockerfile
        build-args: |
          TAG=${{ env.TAG }}

    - name: Build container webhook image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        tags: rancher/hardened-sriov-network-webhook:${{ env.TAG }}-arm64
        target: webhook
        file: Dockerfile
        build-args: |
          TAG=${{ env.TAG }}
